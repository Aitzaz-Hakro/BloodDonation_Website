<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Donor Registration - Blood Bank</title>
    <link rel="icon" type="image/svg" href="media/blood-svgrepo-com.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
      body {
        background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                    url('media/pexels-pranidchakan-boonrom-101111-1350560.jpg') no-repeat center center fixed;
        background-size: cover;
        min-height: 100vh;
      }
      .navbar {
        background-color: rgba(255,255,255,0.95) !important;
      }
      .form-container {
        background: rgba(255,255,255,0.95);
        backdrop-filter: blur(10px);
      }
      .title {
        color: #fff;
        text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.8);
        margin: 2rem 0;
      }
    </style>
  </head>
  <body>

    <!-- NAVBAR -->
    <nav class="navbar">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">
          <img src="media/lifeblood-logo.png" class="logoimg" alt="Logo"> Blood Bank Management System
        </a>
        <button class="navbar-toggler" onclick="toggleMenu()">
          <i class="fa-solid fa-bars"></i>
        </button>
        <div class="nabarbtns" id="navMenu">
          <ul>
            <li><a href="index.html" class="nav-link">Home</a></li>
            <li><a href="registration.html" class="nav-link active">Donate</a></li>
            <li><a href="bloodRequest.html" class="nav-link">Blood Requests</a></li>
            <li><a href="adminPanel.php" class="nav-link">Admin Panel</a></li>
            <li>
              <a href="signIn.html" class="signInButton">Sign In</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="navbar-divider" style="background: rgba(255,255,255,0.3);"></div>

    <main class="container py-4">
      <h2 class="title text-center">Donor Registration</h2>
      
      <!-- Success/Error Messages -->
      <div id="message" class="container" style="max-width: 600px;"></div>
      
      <form class="form-container" id="donorForm" action="submit_blood_req.php" method="POST">
        <fieldset>
          <legend><i class="fa-solid fa-user me-2"></i>Personal Information</legend>
          <input type="text" placeholder="Full Name *" name="full_name" id="full_name" required />
          <div class="form-row">
            <input type="number" placeholder="Age *" name="age" id="age" min="18" max="65" required />
            <select name="gender" id="gender" required>
              <option value="">Select Gender *</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
            </select>
            <select name="blood_group" id="blood_group" required>
              <option value="">Blood Group *</option>
              <option value="A+">A+</option>
              <option value="A-">A-</option>
              <option value="B+">B+</option>
              <option value="B-">B-</option>
              <option value="AB+">AB+</option>
              <option value="AB-">AB-</option>
              <option value="O+">O+</option>
              <option value="O-">O-</option>
            </select>
          </div>
        </fieldset>

        <fieldset>
          <legend><i class="fa-solid fa-address-book me-2"></i>Contact Information</legend>
          <input type="email" placeholder="Email Address *" name="email" id="email" required />
          <input type="tel" placeholder="Phone Number *" name="number" id="number" pattern="[0-9+\-\s]+" required />
          <input type="text" placeholder="Full Address *" name="address" id="address" required />
        </fieldset>

        <fieldset>
          <legend><i class="fa-solid fa-notes-medical me-2"></i>Medical Information</legend>
          <select name="last_donation" id="last_donation">
            <option value="">Last Donation (if any)</option>
            <option value="never">Never Donated</option>
            <option value="3months">Less than 3 months ago</option>
            <option value="6months">3-6 months ago</option>
            <option value="1year">6-12 months ago</option>
            <option value="over1year">Over 1 year ago</option>
          </select>
          <select name="medical_conditions" id="medical_conditions">
            <option value="none">Any Medical Conditions?</option>
            <option value="none">None</option>
            <option value="diabetes">Diabetes</option>
            <option value="hypertension">Hypertension</option>
            <option value="heart">Heart Condition</option>
            <option value="other">Other (will be verified)</option>
          </select>
        </fieldset>

        <div class="checkbox-container">
          <input type="checkbox" id="agree" required />
          <label for="agree">I confirm that the information provided is accurate and I agree to the terms and conditions</label>
        </div>

        <button type="submit" class="submit-btn">
          <i class="fa-solid fa-heart-pulse me-2"></i>REGISTER AS DONOR
        </button>
      </form>
    </main>

    <script>
      // Mobile menu toggle
      function toggleMenu() {
        const navMenu = document.getElementById('navMenu');
        navMenu.classList.toggle('show');
      }

      // Form validation
      document.getElementById('donorForm').addEventListener('submit', function(e) {
        const age = parseInt(document.getElementById('age').value);
        if (age < 18 || age > 65) {
          e.preventDefault();
          alert('Donors must be between 18 and 65 years old.');
          return false;
        }
      });

      // Check for URL parameters (success/error messages)
      const urlParams = new URLSearchParams(window.location.search);
      const status = urlParams.get('status');
      const messageDiv = document.getElementById('message');
      
      if (status === 'success') {
        messageDiv.innerHTML = '<div class="alert-success text-center"><i class="fa-solid fa-check-circle me-2"></i>Registration successful! Thank you for becoming a donor.</div>';
      } else if (status === 'error') {
        messageDiv.innerHTML = '<div class="alert-danger text-center"><i class="fa-solid fa-exclamation-circle me-2"></i>Registration failed. Please try again.</div>';
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
